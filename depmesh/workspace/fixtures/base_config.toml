version = 1

################################
# Relation: governed_by / governs
################################

[[relations]]
id = "governed_by"
# Describe what this relation returns for the queried artifact.
# Use project terms such as specification, test, Python file, source module, or artifact.
description = "Specifications that apply to the artifact."

[[relations]]
id = "governs"
# Reverse relations should get their own wording.
# Here the queried artifact is a specification.
description = "Artifacts governed by the specification."

