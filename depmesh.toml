version = 1

#############################
# Relation: tested_by / tests
#############################

[[relations]]
id = "tested_by"
description = "Tests that verify the artifact."

[[relations]]
id = "tests"
description = "Artifacts verified by the test."

[[rules]]
relation = "tested_by"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/__init__.py" }
dependency = { type = "glob", pattern = "./depmesh/{package_path}/tests/test_init.py" }

[[rules]]
relation = "tested_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/{**package_path}/__init__.py" } },
] }
dependency = { type = "glob", pattern = "./depmesh/{package_path}/tests/test_{module}.py" }

[[rules]]
relation = "tests"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_init.py" }
dependency = { type = "path", path = "./depmesh/{package_path}/__init__.py" }

[[rules]]
relation = "tests"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_init.py" } },
] }
dependency = { type = "path", path = "./depmesh/{package_path}/{module}.py" }

#################################
# Relation: imports / imported_by
#################################

[[relations]]
id = "imports"
description = "Python files imported by the artifact."

[[relations]]
id = "imported_by"
description = "Python files that import the artifact."

[[rules]]
relation = "imports"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "command", command = "python ./bin/depmesh/tach_map_query.py --direction dependencies --artifact ./depmesh/{module_path}.py" }

[[rules]]
relation = "imported_by"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "command", command = "python ./bin/depmesh/tach_map_query.py --direction dependents --artifact ./depmesh/{module_path}.py" }

################################
# Relation: governed_by / governs
################################

[[relations]]
id = "governed_by"
description = "Specifications that apply to the artifact."

[[relations]]
id = "governs"
description = "Artifacts governed by the specification."

[[rules]]
relation = "governed_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./specs/{**path}.md" },
  { type = "not", item = { type = "paths", paths = ["./specs/meta/general.md"] } },
] }
dependency = { type = "path", path = "./specs/meta/general.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/meta/general.md"] }
dependency = { type = "difference", include = { type = "glob", pattern = "./specs/**/*.md" }, exclude = { type = "path", path = "./specs/meta/general.md" } }

[[rules]]
relation = "governed_by"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "path", path = "./specs/architecture/modules_layout.md" }

[[rules]]
relation = "governed_by"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "path", path = "./specs/architecture/naming.md" }

[[rules]]
relation = "governed_by"
artifact = { type = "paths", paths = ["./tach.toml"] }
dependency = { type = "path", path = "./specs/architecture/modules_layout.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/modules_layout.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/*.py" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/modules_layout.md"] }
dependency = { type = "path", path = "./tach.toml" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/naming.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/*.py" }

[[rules]]
relation = "governed_by"
artifact = { type = "any", items = [
  { type = "paths", paths = [
    "./depmesh/core/entities.py",
    "./depmesh/domain/entities.py",
    "./depmesh/cli/entities.py",
    "./depmesh/workspace/entities.py",
    "./depmesh/discovery/entities.py",
    "./depmesh/protocol/entities.py",
  ] },
  { type = "glob", pattern = "./depmesh/discovery/matchers/{*module}.py" },
  { type = "glob", pattern = "./depmesh/discovery/expressions/{*module}.py" },
] }
dependency = { type = "path", path = "./specs/architecture/entities.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/entities.md"] }
dependency = { type = "union", items = [
  { type = "path", path = "./depmesh/core/entities.py" },
  { type = "path", path = "./depmesh/domain/entities.py" },
  { type = "path", path = "./depmesh/cli/entities.py" },
  { type = "path", path = "./depmesh/workspace/entities.py" },
  { type = "path", path = "./depmesh/discovery/entities.py" },
  { type = "path", path = "./depmesh/protocol/entities.py" },
  { type = "glob", pattern = "./depmesh/discovery/matchers/*.py" },
  { type = "glob", pattern = "./depmesh/discovery/expressions/*.py" },
] }

[[rules]]
relation = "governed_by"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/errors.py" }
dependency = { type = "path", path = "./specs/architecture/errors.md" }

[[rules]]
relation = "governed_by"
artifact = { type = "regex", pattern = "^\\./depmesh/(core/warnings|cli/(application|entities)|discovery/(entities|query|matchers/(glob|regex)|expressions/(command|glob|path))|protocol/renderers/base|workspace/(config|entities))\\.py$" }
dependency = { type = "path", path = "./specs/architecture/errors.md" }

[[rules]]
relation = "governed_by"
artifact = { type = "regex", pattern = "^\\./depmesh/(core/tests/test_warnings|cli/tests/test_application|discovery/tests/(test_errors|test_query)|discovery/expressions/tests/test_(command|glob|path)|workspace/tests/test_config)\\.py$" }
dependency = { type = "path", path = "./specs/architecture/errors.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/errors.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/errors.py" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/errors.md"] }
dependency = { type = "regex", pattern = "^\\./depmesh/(core/warnings|cli/(application|entities)|discovery/(entities|query|matchers/(glob|regex)|expressions/(command|glob|path))|protocol/renderers/base|workspace/(config|entities))\\.py$" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/errors.md"] }
dependency = { type = "regex", pattern = "^\\./depmesh/(core/tests/test_warnings|cli/tests/test_application|discovery/tests/(test_errors|test_query)|discovery/expressions/tests/test_(command|glob|path)|workspace/tests/test_config)\\.py$" }

[[rules]]
relation = "governed_by"
artifact = { type = "regex", pattern = "^\\./depmesh/.+/tests/test_[^/]+\\.py$" }
dependency = { type = "path", path = "./specs/architecture/tests.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/tests.md"] }
dependency = { type = "regex", pattern = "^\\./depmesh/.+/tests/test_[^/]+\\.py$" }

