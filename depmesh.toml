version = 1

#############################
# Relation: tested_by / tests
#############################

[[relations]]
id = "tested_by"
description = "Tests that verify the input."

[[relations]]
id = "tests"
description = "Artifacts verified by the test."

# Package initializers are verified by matching tests/test_init.py files.
[[rules]]
relation = "tested_by"
input = { type = "glob", pattern = "./depmesh/{**package_path}/__init__.py" }
output = { type = "files", pattern = "./depmesh/{package_path}/tests/test_init.py" }

# Regular Python modules are verified by sibling tests/test_<module>.py files.
[[rules]]
relation = "tested_by"
input = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/**/__init__.py" } },
] }
output = { type = "files", pattern = "./depmesh/{package_path}/tests/test_{module}.py" }

# tests/test_init.py maps back to the package initializer it verifies.
[[rules]]
relation = "tests"
input = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_init.py" }
output = { type = "list", artifacts = ["./depmesh/{package_path}/__init__.py"] }

# tests/test_<module>.py maps back to the module it verifies.
[[rules]]
relation = "tests"
input = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/**/tests/test_init.py" } },
] }
output = { type = "list", artifacts = ["./depmesh/{package_path}/{module}.py"] }

#################################
# Relation: imports / imported_by
#################################

[[relations]]
id = "imports"
description = "Python files imported by the input."

[[relations]]
id = "imported_by"
description = "Python files that import the input."

# Tach provides direct Python imports for project modules.
[[rules]]
relation = "imports"
input = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
output = {
  type = "command",
  command = "python ./bin/depmesh/tach_map_query.py --direction dependencies --artifact ./depmesh/{module_path}.py",
}

# Tach provides reverse Python import lookups for project modules.
[[rules]]
relation = "imported_by"
input = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
output = {
  type = "command",
  command = "python ./bin/depmesh/tach_map_query.py --direction dependents --artifact ./depmesh/{module_path}.py",
}

################################
# Relation: governed_by / governs
################################

[[relations]]
id = "governed_by"
description = "Specifications that apply to the input."

[[relations]]
id = "governs"
description = "Artifacts governed by the specification."

# Every specification document is governed by the general specification rules.
# Note: general.md governs itself too.
[[rules]]
relation = "governed_by"
input = { type = "glob", pattern = "./specs/**/*.md" }
output = { type = "list", artifacts = ["./specs/meta/general.md"] }

# The general specification rules govern every specification document.
# Note: general.md governs itself too.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/meta/general.md"] }
output = { type = "files", pattern = "./specs/**/*.md" }

# Python files are governed by every architecture spec.
[[rules]]
relation = "governed_by"
input = { type = "glob", pattern = "./depmesh/**/*.py" }
output = { type = "files", pattern = "./specs/architecture/*.md" }

# tach.toml is governed by the module layout architecture spec.
[[rules]]
relation = "governed_by"
input = { type = "one_of", artifacts = ["./tach.toml"] }
output = { type = "list", artifacts = ["./specs/architecture/modules_layout.md"] }

# Architecture specs govern every Python file.
[[rules]]
relation = "governs"
input = { type = "glob", pattern = "./specs/architecture/*.md" }
output = { type = "files", pattern = "./depmesh/**/*.py" }

# The module layout spec also governs tach.toml.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/architecture/modules_layout.md"] }
output = { type = "list", artifacts = ["./tach.toml"] }

# CLI, protocol, and skill-facing code is governed by the CLI behavior spec.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "glob", pattern = "./depmesh/cli/**/*.py" },
  { type = "glob", pattern = "./depmesh/protocol/**/*.py" },
  { type = "glob", pattern = "./depmesh/skills/**/*.py" },
  { type = "glob", pattern = "./depmesh/skills/**/*.md" },
  { type = "glob", pattern = "./depmesh/workspace/init.py" },
  { type = "glob", pattern = "./depmesh/workspace/tests/test_init.py" },
  { type = "glob", pattern = "./depmesh/workspace/fixtures/*.toml" },
  { type = "one_of", artifacts = [
    "./depmesh/__init__.py",
    "./depmesh/__main__.py",
  ] },
] }
output = { type = "list", artifacts = ["./specs/behavior/cli.md"] }

# The CLI behavior spec governs CLI, protocol, skill, and entrypoint code.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/behavior/cli.md"] }
output = { type = "union", items = [
  { type = "files", pattern = "./depmesh/cli/**/*.py" },
  { type = "files", pattern = "./depmesh/protocol/**/*.py" },
  { type = "files", pattern = "./depmesh/skills/**/*.py" },
  { type = "files", pattern = "./depmesh/skills/**/*.md" },
  { type = "list", artifacts = ["./depmesh/workspace/init.py"] },
  { type = "list", artifacts = ["./depmesh/workspace/tests/test_init.py"] },
  { type = "files", pattern = "./depmesh/workspace/fixtures/*.toml" },
  { type = "list", artifacts = ["./depmesh/__init__.py"] },
  { type = "list", artifacts = ["./depmesh/__main__.py"] },
] }

# Built-in skill fixtures are governed by the skill fixture behavior spec.
[[rules]]
relation = "governed_by"
input = { type = "glob", pattern = "./depmesh/skills/fixtures/*.md" }
output = { type = "list", artifacts = ["./specs/behavior/skill_fixtures.md"] }

# The skill fixture behavior spec governs built-in skill fixtures.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/behavior/skill_fixtures.md"] }
output = { type = "files", pattern = "./depmesh/skills/fixtures/*.md" }

################################
# Relation: README documentation
################################

# README.md is governed by its documentation spec.
[[rules]]
relation = "governed_by"
input = { type = "one_of", artifacts = ["./README.md"] }
output = { type = "list", artifacts = ["./specs/documentation/readme.md"] }

# The README documentation spec governs README.md.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/documentation/readme.md"] }
output = { type = "list", artifacts = ["./README.md"] }

# Configuration behavior governs the config file, helper scripts, and config/discovery code.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "one_of", artifacts = ["./depmesh.toml"] },
  { type = "glob", pattern = "./bin/depmesh/**" },
  { type = "glob", pattern = "./depmesh/workspace/**/*.py" },
  { type = "glob", pattern = "./depmesh/workspace/fixtures/*.toml" },
  { type = "glob", pattern = "./depmesh/discovery/**/*.py" },
] }
output = { type = "list", artifacts = ["./specs/behavior/config.md"] }

# The configuration spec governs the config file, helper scripts, and config/discovery code.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["./specs/behavior/config.md"] }
output = { type = "union", items = [
  { type = "list", artifacts = ["./depmesh.toml"] },
  { type = "files", pattern = "./bin/depmesh/**/*" },
  { type = "files", pattern = "./depmesh/workspace/**/*.py" },
  { type = "files", pattern = "./depmesh/workspace/fixtures/*.toml" },
  { type = "files", pattern = "./depmesh/discovery/**/*.py" },
] }

############################################
# Relation: terms_defined_by / defines_terms_for
############################################

[[relations]]
id = "terms_defined_by"
description = "Dictionaries that define terms used by the input."

[[relations]]
id = "defines_terms_for"
description = "Artifacts that use terms from the dictionary."

# Specs, code, and this config use terms defined in the project dictionary.
# Note: dictionary.md can define terms for itself too.
[[rules]]
relation = "terms_defined_by"
input = { type = "any", items = [
  { type = "glob", pattern = "./specs/**/*.md" },
  { type = "glob", pattern = "./depmesh/**/*.py" },
  { type = "one_of", artifacts = [
    "./depmesh.toml",
    "./README.md",
  ] },
] }
output = { type = "list", artifacts = ["./specs/dictionary.md"] }

# The dictionary defines terms used by specs, code, and this config.
# Note: dictionary.md can define terms for itself too.
[[rules]]
relation = "defines_terms_for"
input = { type = "one_of", artifacts = ["./specs/dictionary.md"] }
output = { type = "union", items = [
  { type = "files", pattern = "./specs/**/*.md" },
  { type = "files", pattern = "./depmesh/**/*.py" },
  { type = "list", artifacts = [
    "./depmesh.toml",
    "./README.md",
  ] },
] }

#############################
# Relation: indexed_by / indexes
#############################

[[relations]]
id = "indexed_by"
description = "Indexes that list the specification."

[[relations]]
id = "indexes"
description = "Specifications listed by the index."

# Every specification document is listed by the spec index.
# Note: intro.md indexes itself too.
[[rules]]
relation = "indexed_by"
input = { type = "glob", pattern = "./specs/**/*.md" }
output = { type = "list", artifacts = ["./specs/intro.md"] }

# intro.md indexes every specification document.
# Note: intro.md indexes itself too.
[[rules]]
relation = "indexes"
input = { type = "one_of", artifacts = ["./specs/intro.md"] }
output = { type = "files", pattern = "./specs/**/*.md" }
