version = 1

#############################
# Relation: tested_by / tests
#############################

[[relations]]
id = "tested_by"
description = "Tests that verify the artifact."

[[relations]]
id = "tests"
description = "Artifacts verified by the test."

[[rules]]
relation = "tested_by"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/__init__.py" }
dependency = { type = "glob", pattern = "./depmesh/{package_path}/tests/test_init.py" }

[[rules]]
relation = "tested_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/{**package_path}/__init__.py" } },
] }
dependency = { type = "glob", pattern = "./depmesh/{package_path}/tests/test_{module}.py" }

[[rules]]
relation = "tests"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_init.py" }
dependency = { type = "path", path = "./depmesh/{package_path}/__init__.py" }

[[rules]]
relation = "tests"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_init.py" } },
] }
dependency = { type = "path", path = "./depmesh/{package_path}/{module}.py" }

#################################
# Relation: imports / imported_by
#################################

[[relations]]
id = "imports"
description = "Python files imported by the artifact."

[[relations]]
id = "imported_by"
description = "Python files that import the artifact."

[[rules]]
relation = "imports"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "command", command = "python ./bin/depmesh/tach_map_query.py --direction dependencies --artifact ./depmesh/{module_path}.py" }

[[rules]]
relation = "imported_by"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "command", command = "python ./bin/depmesh/tach_map_query.py --direction dependents --artifact ./depmesh/{module_path}.py" }

################################
# Relation: governed_by / governs
################################

[[relations]]
id = "governed_by"
description = "Specifications that apply to the artifact."

[[relations]]
id = "governs"
description = "Artifacts governed by the specification."

[[rules]]
relation = "governed_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./specs/{**path}.md" },
  { type = "not", item = { type = "paths", paths = ["./specs/meta/general.md"] } },
] }
dependency = { type = "path", path = "./specs/meta/general.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/meta/general.md"] }
dependency.type = "difference"
dependency.include = { type = "glob", pattern = "./specs/**/*.md" }
dependency.exclude = { type = "path", path = "./specs/meta/general.md" }

[[rules]]
relation = "governed_by"
artifact = { type = "glob", pattern = "./depmesh/{**module_path}.py" }
dependency = { type = "union", items = [
  { type = "path", path = "./specs/architecture/modules_layout.md" },
  { type = "path", path = "./specs/architecture/naming.md" },
] }

[[rules]]
relation = "governed_by"
artifact = { type = "paths", paths = ["./tach.toml"] }
dependency = { type = "path", path = "./specs/architecture/modules_layout.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/modules_layout.md"] }
dependency = { type = "union", items = [
  { type = "glob", pattern = "./depmesh/**/*.py" },
  { type = "path", path = "./tach.toml" },
] }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/naming.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/*.py" }

[[rules]]
relation = "governed_by"
artifact = { type = "any", items = [
  { type = "paths", paths = [
    "./depmesh/core/entities.py",
    "./depmesh/domain/entities.py",
    "./depmesh/cli/entities.py",
    "./depmesh/workspace/entities.py",
    "./depmesh/discovery/entities.py",
    "./depmesh/protocol/entities.py",
  ] },
  { type = "glob", pattern = "./depmesh/discovery/matchers/{*module}.py" },
  { type = "glob", pattern = "./depmesh/discovery/expressions/{*module}.py" },
] }
dependency = { type = "path", path = "./specs/architecture/entities.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/entities.md"] }
dependency = { type = "union", items = [
  { type = "path", path = "./depmesh/core/entities.py" },
  { type = "path", path = "./depmesh/domain/entities.py" },
  { type = "path", path = "./depmesh/cli/entities.py" },
  { type = "path", path = "./depmesh/workspace/entities.py" },
  { type = "path", path = "./depmesh/discovery/entities.py" },
  { type = "path", path = "./depmesh/protocol/entities.py" },
  { type = "glob", pattern = "./depmesh/discovery/matchers/*.py" },
  { type = "glob", pattern = "./depmesh/discovery/expressions/*.py" },
] }

[[rules]]
relation = "governed_by"
artifact = { type = "any", items = [
  { type = "glob", pattern = "./depmesh/{**package_path}/errors.py" },
  { type = "paths", paths = [
    "./depmesh/core/warnings.py",
    "./depmesh/cli/application.py",
    "./depmesh/cli/entities.py",
    "./depmesh/discovery/entities.py",
    "./depmesh/discovery/query.py",
    "./depmesh/discovery/matchers/glob.py",
    "./depmesh/discovery/matchers/regex.py",
    "./depmesh/discovery/expressions/command.py",
    "./depmesh/discovery/expressions/glob.py",
    "./depmesh/discovery/expressions/path.py",
    "./depmesh/protocol/renderers/base.py",
    "./depmesh/workspace/config.py",
    "./depmesh/workspace/entities.py",
  ] },
  { type = "paths", paths = [
    "./depmesh/core/tests/test_warnings.py",
    "./depmesh/cli/tests/test_application.py",
    "./depmesh/discovery/tests/test_errors.py",
    "./depmesh/discovery/tests/test_query.py",
    "./depmesh/discovery/expressions/tests/test_command.py",
    "./depmesh/discovery/expressions/tests/test_glob.py",
    "./depmesh/discovery/expressions/tests/test_path.py",
    "./depmesh/workspace/tests/test_config.py",
  ] },
] }
dependency = { type = "path", path = "./specs/architecture/errors.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/errors.md"] }
dependency = { type = "union", items = [
  { type = "glob", pattern = "./depmesh/**/errors.py" },
  { type = "path", path = "./depmesh/core/warnings.py" },
  { type = "path", path = "./depmesh/cli/application.py" },
  { type = "path", path = "./depmesh/cli/entities.py" },
  { type = "path", path = "./depmesh/discovery/entities.py" },
  { type = "path", path = "./depmesh/discovery/query.py" },
  { type = "path", path = "./depmesh/discovery/matchers/glob.py" },
  { type = "path", path = "./depmesh/discovery/matchers/regex.py" },
  { type = "path", path = "./depmesh/discovery/expressions/command.py" },
  { type = "path", path = "./depmesh/discovery/expressions/glob.py" },
  { type = "path", path = "./depmesh/discovery/expressions/path.py" },
  { type = "path", path = "./depmesh/protocol/renderers/base.py" },
  { type = "path", path = "./depmesh/workspace/config.py" },
  { type = "path", path = "./depmesh/workspace/entities.py" },
  { type = "path", path = "./depmesh/core/tests/test_warnings.py" },
  { type = "path", path = "./depmesh/cli/tests/test_application.py" },
  { type = "path", path = "./depmesh/discovery/tests/test_errors.py" },
  { type = "path", path = "./depmesh/discovery/tests/test_query.py" },
  { type = "path", path = "./depmesh/discovery/expressions/tests/test_command.py" },
  { type = "path", path = "./depmesh/discovery/expressions/tests/test_glob.py" },
  { type = "path", path = "./depmesh/discovery/expressions/tests/test_path.py" },
  { type = "path", path = "./depmesh/workspace/tests/test_config.py" },
] }

[[rules]]
relation = "governed_by"
artifact = { type = "glob", pattern = "./depmesh/{**package_path}/tests/test_{*module}.py" }
dependency = { type = "path", path = "./specs/architecture/tests.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/architecture/tests.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/tests/test_*.py" }

[[rules]]
relation = "governed_by"
artifact = { type = "any", items = [
  { type = "glob", pattern = "./depmesh/cli/{**path}.py" },
  { type = "glob", pattern = "./depmesh/protocol/{**path}.py" },
  { type = "glob", pattern = "./depmesh/skills/{**path}.py" },
  { type = "glob", pattern = "./depmesh/skills/{**path}.md" },
  { type = "paths", paths = [
    "./depmesh/__init__.py",
    "./depmesh/__main__.py",
  ] },
] }
dependency = { type = "path", path = "./specs/behavior/cli.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/behavior/cli.md"] }
dependency = { type = "union", items = [
  { type = "glob", pattern = "./depmesh/cli/**/*.py" },
  { type = "glob", pattern = "./depmesh/protocol/**/*.py" },
  { type = "glob", pattern = "./depmesh/skills/**/*.py" },
  { type = "glob", pattern = "./depmesh/skills/**/*.md" },
  { type = "path", path = "./depmesh/__init__.py" },
  { type = "path", path = "./depmesh/__main__.py" },
] }

[[rules]]
relation = "governed_by"
artifact = { type = "any", items = [
  { type = "paths", paths = [
    "./depmesh.toml",
    "./bin/depmesh/tach_map_query.py",
  ] },
  { type = "glob", pattern = "./depmesh/workspace/{**path}.py" },
  { type = "glob", pattern = "./depmesh/discovery/{**path}.py" },
] }
dependency = { type = "path", path = "./specs/behavior/config.md" }

[[rules]]
relation = "governs"
artifact = { type = "paths", paths = ["./specs/behavior/config.md"] }
dependency = { type = "union", items = [
  { type = "path", path = "./depmesh.toml" },
  { type = "path", path = "./bin/depmesh/tach_map_query.py" },
  { type = "glob", pattern = "./depmesh/workspace/**/*.py" },
  { type = "glob", pattern = "./depmesh/discovery/**/*.py" },
] }

############################################
# Relation: terms_defined_by / defines_terms_for
############################################

[[relations]]
id = "terms_defined_by"
description = "Dictionaries that define terms used by the artifact."

[[relations]]
id = "defines_terms_for"
description = "Artifacts that use terms from the dictionary."

[[rules]]
relation = "terms_defined_by"
artifact = { type = "any", items = [
  { type = "all", items = [
    { type = "glob", pattern = "./specs/{**path}.md" },
    { type = "not", item = { type = "paths", paths = ["./specs/dictionary.md"] } },
  ] },
  { type = "glob", pattern = "./depmesh/{**path}.py" },
  { type = "paths", paths = ["./depmesh.toml"] },
] }
dependency = { type = "path", path = "./specs/dictionary.md" }

[[rules]]
relation = "defines_terms_for"
artifact = { type = "paths", paths = ["./specs/dictionary.md"] }
dependency = { type = "union", items = [
  { type = "difference", include = { type = "glob", pattern = "./specs/**/*.md" }, exclude = { type = "path", path = "./specs/dictionary.md" } },
  { type = "glob", pattern = "./depmesh/**/*.py" },
  { type = "path", path = "./depmesh.toml" },
] }

#############################
# Relation: indexed_by / indexes
#############################

[[relations]]
id = "indexed_by"
description = "Indexes that list the specification."

[[relations]]
id = "indexes"
description = "Specifications listed by the index."

[[rules]]
relation = "indexed_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./specs/{**path}.md" },
  { type = "not", item = { type = "paths", paths = ["./specs/intro.md"] } },
] }
dependency = { type = "path", path = "./specs/intro.md" }

[[rules]]
relation = "indexes"
artifact = { type = "paths", paths = ["./specs/intro.md"] }
dependency.type = "difference"
dependency.include = { type = "glob", pattern = "./specs/**/*.md" }
dependency.exclude = { type = "path", path = "./specs/intro.md" }
