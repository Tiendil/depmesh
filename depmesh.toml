############################################
# Relation: terms_defined_by / defines_terms_for
############################################

[[relations]]
id = "terms_defined_by"
description = "Dictionaries that define terms used by the artifact."

[[relations]]
id = "defines_terms_for"
description = "Artifacts that use terms from the dictionary."

[[rules]]
relation = "terms_defined_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./specs/{**path}.md" },
  { type = "not", item = { type = "paths", paths = ["./specs/dictionary.md"] } },
] }
dependency = { type = "path", path = "./specs/dictionary.md" }

[[rules]]
relation = "terms_defined_by"
artifact = { type = "glob", pattern = "./depmesh/{**path}.py" }
dependency = { type = "path", path = "./specs/dictionary.md" }

[[rules]]
relation = "terms_defined_by"
artifact = { type = "paths", paths = ["./depmesh.toml"] }
dependency = { type = "path", path = "./specs/dictionary.md" }

[[rules]]
relation = "defines_terms_for"
artifact = { type = "paths", paths = ["./specs/dictionary.md"] }
dependency = { type = "difference", include = { type = "glob", pattern = "./specs/**/*.md" }, exclude = { type = "path", path = "./specs/dictionary.md" } }

[[rules]]
relation = "defines_terms_for"
artifact = { type = "paths", paths = ["./specs/dictionary.md"] }
dependency = { type = "glob", pattern = "./depmesh/**/*.py" }

[[rules]]
relation = "defines_terms_for"
artifact = { type = "paths", paths = ["./specs/dictionary.md"] }
dependency = { type = "path", path = "./depmesh.toml" }

#############################
# Relation: indexed_by / indexes
#############################

[[relations]]
id = "indexed_by"
description = "Indexes that list the specification."

[[relations]]
id = "indexes"
description = "Specifications listed by the index."

[[rules]]
relation = "indexed_by"
artifact = { type = "all", items = [
  { type = "glob", pattern = "./specs/{**path}.md" },
  { type = "not", item = { type = "paths", paths = ["./specs/intro.md"] } },
] }
dependency = { type = "path", path = "./specs/intro.md" }

[[rules]]
relation = "indexes"
artifact = { type = "paths", paths = ["./specs/intro.md"] }
dependency = { type = "difference", include = { type = "glob", pattern = "./specs/**/*.md" }, exclude = { type = "path", path = "./specs/intro.md" } }
